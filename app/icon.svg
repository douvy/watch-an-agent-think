<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Pixel creature: cat ears + face patch, robot body + arms + legs.
       Blink is discrete frame-stepping (calcMode=discrete) — no easing. -->
  <g fill="#3a3f4a">
    <!-- ears -->
    <rect x="3" y="1" width="1" height="1"/>
    <rect x="3" y="2" width="2" height="1"/>
    <rect x="3" y="3" width="3" height="1"/>
    <rect x="12" y="1" width="1" height="1"/>
    <rect x="11" y="2" width="2" height="1"/>
    <rect x="10" y="3" width="3" height="1"/>
    <!-- body -->
    <rect x="2" y="4" width="12" height="8"/>
    <!-- arms -->
    <rect x="0" y="6" width="2" height="3"/>
    <rect x="14" y="6" width="2" height="3"/>
    <!-- legs -->
    <rect x="2" y="12" width="2" height="1"/>
    <rect x="5" y="12" width="2" height="1"/>
    <rect x="9" y="12" width="2" height="1"/>
    <rect x="12" y="12" width="2" height="1"/>
  </g>
  <!-- face patch -->
  <rect x="3" y="5" width="10" height="4" fill="#555b68"/>
  <!-- eyes -->
  <g fill="#84f0a1">
    <rect x="5" y="6" width="2" height="2">
      <animate attributeName="height" values="2;1;2" keyTimes="0;0.92;0.97" calcMode="discrete" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="y" values="6;7;6" keyTimes="0;0.92;0.97" calcMode="discrete" dur="4s" repeatCount="indefinite"/>
    </rect>
    <rect x="9" y="6" width="2" height="2">
      <animate attributeName="height" values="2;1;2" keyTimes="0;0.92;0.97" calcMode="discrete" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="y" values="6;7;6" keyTimes="0;0.92;0.97" calcMode="discrete" dur="4s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
